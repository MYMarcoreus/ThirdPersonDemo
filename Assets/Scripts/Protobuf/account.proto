syntax = "proto3";
package yy.protocol.app;
option cc_generic_services = true;
import "account_data.proto";

message LoginReq {
    string username = 3;
    string password = 4;
}
message LoginRsp {
    enum Status {
        eSuccess = 0;
        eAccountNotExist = 1;
        ePasswordError = 2;
        eAlreadyLoggedIn = 3;
        eUnknownError = 4;
    }
    Status result_code = 1;

    AccountBaseData account_data = 2;
    string token = 3;
}

message RegisterReq {
    string username = 3;
    string password = 4;
}
message RegisterRsp {
    enum Status {
        eSuccess = 0;
        eAccountAlreadyExist = 2;
        eUnknownError = 3;
    }
    Status result_code = 2;

    uint64 uid = 4;
}

message QuitLoginReq {
    uint64 uid = 1;
}
message QuitLoginRsp {
    enum Status {
        eSuccess = 0;
        eAccountNotExist = 1;
        eNotLogin = 2;
        eUnknownError = 3;
    }
    uint64 uid = 1;
    Status result_code = 2;
}


service AccountServiceRpc
{
    rpc Login(LoginReq) returns(LoginRsp);
    rpc Register(RegisterReq) returns(RegisterRsp);
}