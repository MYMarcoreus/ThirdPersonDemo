syntax = "proto3";
package yy.protocol.core;

//option optimize_for = LITE_RUNTIME;   // 链接libprotobuf-lite.so，减少资源消耗

message XorBodyRsp {
    uint32 xor_code = 1;
}

message HeartBody
{

}

message SecurityCheckReq {
    uint32 app_id      = 1;
    uint32 app_version = 2;
    string app_md5     = 3;
}
message SecurityCheckRsp {
    enum ResultCode {
        eSuccess          = 0;
        eAppVersionFailed = 1;
        eMd5Failed        = 2;
    }
    ResultCode result_code  = 1;
    optional uint32 server_udp_port  = 2;
    optional uint64 session_id = 3; // 连接标识，仅在 eSuccess 时使用
}

message UdpPortRegisterReq  {
    uint64 session_id = 1;
    string client_udp_ip  = 2;
    uint32 client_udp_port  = 3;
}
message UdpPortRegisterRsp {
    uint64 session_id = 1;

    enum Status {
        eSuccess = 0;
        eInvalidPort = 1;
        eDuplicatePort = 2;
    }
    Status status = 2;
}

//message S2SMessageRegister